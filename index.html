* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  font-family: 'Plus Jakarta Sans', sans-serif;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
}
canvas { display: block; margin: 0 auto; }
#game-container {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}
#ui-overlay {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 10;
}
#ui-overlay * { pointer-events: auto; }
.hud {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.2);
  font-family: 'Fredoka', sans-serif;
  color: #fff;
}
.hud-item { text-align: center; min-width: 70px; }
.hud-label { font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
.hud-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums lining-nums; }
.title-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  transition: opacity 0.5s;
}
.title-screen h1 {
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(36px, 8vw, 56px);
  color: #fff;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
  margin-bottom: 8px;
}
.title-screen .subtitle {
  font-size: clamp(14px, 3vw, 18px);
  color: rgba(255,255,255,0.85);
  margin-bottom: 40px;
}
.play-btn {
  font-family: 'Fredoka', sans-serif;
  font-size: 20px; font-weight: 600;
  color: #764ba2;
  background: #fff;
  border: none; border-radius: 50px;
  padding: 16px 48px;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}
.play-btn:active { transform: scale(0.95); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }

/* Celebration overlay */
.celebration-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s;
}
.celebration-overlay.active { opacity: 1; pointer-events: auto; }
.celebration-face {
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 4px solid #fff;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: celebBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  object-fit: cover;
}
.celebration-msg {
  font-family: 'Fredoka', sans-serif;
  font-size: 28px; font-weight: 700;
  color: #fff;
  text-shadow: 0 3px 12px rgba(0,0,0,0.4);
  margin-top: 16px;
  animation: celebSlide 0.5s 0.2s both;
}
.celebration-faces-row {
  display: flex; gap: 16px; margin-bottom: 8px;
}
.celebration-faces-row .celebration-face {
  width: 80px; height: 80px;
}
@keyframes celebBounce {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes celebSlide {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
/* Level complete */
.level-complete-overlay {
  position: fixed; inset: 0; z-index: 300;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s;
}
.level-complete-overlay.active { opacity: 1; pointer-events: auto; }
.level-badge {
  font-family: 'Fredoka', sans-serif;
  font-size: 18px; color: rgba(255,255,255,0.8);
  margin-bottom: 8px;
  animation: celebSlide 0.4s both;
}
.level-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 36px; font-weight: 700; color: #fff;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  margin-bottom: 24px;
  animation: celebSlide 0.5s 0.1s both;
}
.level-score {
  font-family: 'Fredoka', sans-serif;
  font-size: 20px; color: rgba(255,255,255,0.9);
  margin-bottom: 32px;
  animation: celebSlide 0.5s 0.2s both;
}
.next-btn {
  font-family: 'Fredoka', sans-serif;
  font-size: 18px; font-weight: 600;
  color: #764ba2; background: #fff;
  border: none; border-radius: 50px;
  padding: 14px 40px; cursor: pointer;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  animation: celebSlide 0.5s 0.3s both;
  transition: transform 0.2s;
}
.next-btn:active { transform: scale(0.95); }
/* Particles */
.particle {
  position: fixed; width: 8px; height: 8px;
  border-radius: 50%; pointer-events: none; z-index: 250;
}
/* Progress bar */
.progress-container {
  width: calc(100% - 40px); max-width: 500px;
  height: 12px; background: rgba(255,255,255,0.2);
  border-radius: 6px; margin: 6px 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #f093fb, #f5576c);
  border-radius: 6px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.footer-link {
  position: fixed; bottom: 8px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: rgba(255,255,255,0.4);
  text-decoration: none; z-index: 5;
}
.footer-link:hover { color: rgba(255,255,255,0.7); }

// Audio context
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type = 'sine', vol = 0.15) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playMatchSound(combo) {
  const baseFreq = 440 + combo * 80;
  playTone(baseFreq, 0.15, 'sine', 0.12);
  setTimeout(() => playTone(baseFreq * 1.25, 0.12, 'sine', 0.1), 60);
}

function playSwapSound() {

}

// ── Sizing ──
function resize() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const hudH = 80;
  const availH = H - hudH - 20;
  const availW = W - 20;

  cellSize = Math.floor(Math.min(availW / COLS, availH / ROWS));
  cellSize = Math.min(cellSize, 64);

  boardW = cellSize * COLS;
  boardH = cellSize * ROWS;
  boardX = Math.floor((W - boardW) / 2);
  boardY = hudH + Math.floor((availH - boardH) / 2) + 10;

  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}

// ── Board logic ──
function createGem(type) {
  return {
    type: type,
    x: 0, y: 0,       // render position (animated)
    targetX: 0, targetY: 0,
    scale: 1,
    alpha: 1,
    matched: false,
    isNew: false
  };
}

function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      let type;
      do {
        type = Math.floor(Math.random() * GEM_TYPES);
      } while (wouldMatch(r, c, type));
      const gem = createGem(type);
      gem.x = c; gem.y = r;
      gem.targetX = c; gem.targetY = r;
      board[r][c] = gem;
    }
  }
}

function wouldMatch(row, col, type) {
  // Check horizontal
  if (col >= 2 && board[row][col-1] && board[row][col-2] &&
      board[row][col-1].type === type && board[row][col-2].type === type) return true;
  // Check vertical
  if (row >= 2 && board[row-1] && board[row-2] &&
      board[row-1][col] && board[row-2][col] &&
      board[row-1][col].type === type && board[row-2][col].type === type) return true;
  return false;
}

function findMatches() {
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      if (!board[r][c] || !board[r][c+1] || !board[r][c+2]) continue;
      const t = board[r][c].type;
      if (board[r][c+1].type === t && board[r][c+2].type === t) {
        matched.add(`${r},${c}`);
        matched.add(`${r},${c+1}`);
        matched.add(`${r},${c+2}`);
        // Extend
        let k = c + 3;
        while (k < COLS && board[r][k] && board[r][k].type === t) {
          matched.add(`${r},${k}`); k++;
        }
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      if (!board[r][c] || !board[r+1][c] || !board[r+2][c]) continue;
      const t = board[r][c].type;
      if (board[r+1][c].type === t && board[r+2][c].type === t) {
        matched.add(`${r},${c}`);
        matched.add(`${r+1},${c}`);
        matched.add(`${r+2},${c}`);
        let k = r + 3;
        while (k < ROWS && board[k][c] && board[k][c].type === t) {
          matched.add(`${k},${c}`); k++;
        }
      }
    }
  }
  return matched;
}

function removeMatches(matched) {
  const count = matched.size;
  for (const key of matched) {
    const [r, c] = key.split(',').map(Number);
    if (board[r][c]) {
      // Spawn particles
      spawnParticles(c, r, board[r][c].type, 6);
      board[r][c] = null;
    }
  }
  return count;
}

function dropGems() {
  let moved = false;
  for (let c = 0; c < COLS; c++) {
    let emptyRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c]) {
        if (r !== emptyRow) {
          board[emptyRow][c] = board[r][c];
          board[emptyRow][c].targetY = emptyRow;
          board[r][c] = null;
          moved = true;
        }
        emptyRow--;
      }
    }
    // Fill empty at top
    for (let r = emptyRow; r >= 0; r--) {
      const type = Math.floor(Math.random() * GEM_TYPES);
      const gem = createGem(type);
      gem.x = c;
      gem.y = r - (emptyRow - r + 1); // Start above board
      gem.targetX = c;
      gem.targetY = r;
      gem.isNew = true;
      board[r][c] = gem;
      moved = true;
    }
  }
  return moved;
}

function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Try swap right
      if (c < COLS - 1) {
        swapInBoard(r, c, r, c + 1);
        if (findMatches().size > 0) { swapInBoard(r, c, r, c + 1); return true; }
        swapInBoard(r, c, r, c + 1);
      }
      // Try swap down
      if (r < ROWS - 1) {
        swapInBoard(r, c, r + 1, c);
        if (findMatches().size > 0) { swapInBoard(r, c, r + 1, c); return true; }
        swapInBoard(r, c, r + 1, c);
      }
    }
  }
  return false;
}

function swapInBoard(r1, c1, r2, c2) {
  const temp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = temp;
}

function shuffleBoard() {
  // Flatten, shuffle, refill
  const gems = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) gems.push(board[r][c].type);
  
  for (let i = gems.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [gems[i], gems[j]] = [gems[j], gems[i]];
  }
  
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      board[r][c].type = gems[idx++];
      board[r][c].x = c;
      board[r][c].y = r;
      board[r][c].targetX = c;
      board[r][c].targetY = r;
    }
  }
}

// ── Particles ──
function spawnParticles(col, row, type, count) {
  const cx = boardX + col * cellSize + cellSize / 2;
  const cy = boardY + row * cellSize + cellSize / 2;
  const color = GEM_COLORS[type];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 80 + Math.random() * 120;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 60,
      life: 0.6 + Math.random() * 0.4,
      maxLife: 1,
      size: 3 + Math.random() * 4,
      color: color.base,
      lightColor: color.light
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    const s = p.size * alpha;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.lightColor;
    ctx.beginPath();
    ctx.arc(p.x, p.y, s, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── Drawing ──
function drawGem(x, y, size, type, scale, alpha, selected) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  
  const cx = x + size / 2;
  const cy = y + size / 2;
  const r = (size * 0.38) * scale;
  const color = GEM_COLORS[type];
  const shape = GEM_SHAPES[type];
  
  ctx.translate(cx, cy);
  
  // Glow
  if (selected) {
    ctx.shadowColor = color.glow;
    ctx.shadowBlur = 20;
  }
  
  // Draw shape
  ctx.fillStyle = color.base;
  ctx.strokeStyle = color.dark;
  ctx.lineWidth = 2;
  
  switch(shape) {
    case 'circle':
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Glossy highlight
      const cg = ctx.createRadialGradient(-r*0.3, -r*0.3, 0, 0, 0, r);
      cg.addColorStop(0, 'rgba(255,255,255,0.6)');
      cg.addColorStop(0.5, 'rgba(255,255,255,0.1)');
      cg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      break;
      
    case 'diamond':
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(r, 0);
      ctx.lineTo(0, r);
      ctx.lineTo(-r, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // Highlight
      ctx.fillStyle = color.light;
      ctx.globalAlpha = alpha * 0.4;
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(r*0.4, -r*0.2);
      ctx.lineTo(0, r*0.1);
      ctx.lineTo(-r*0.4, -r*0.2);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = alpha;
      break;
      
    case 'square':
      const sr = r * 0.85;
      const cr = r * 0.15;
      ctx.beginPath();
      ctx.roundRect(-sr, -sr, sr*2, sr*2, cr);
      ctx.fill();
      ctx.stroke();
      // Highlight
      const sg = ctx.createLinearGradient(-sr, -sr, sr, sr);
      sg.addColorStop(0, 'rgba(255,255,255,0.4)');
      sg.addColorStop(0.5, 'rgba(255,255,255,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.roundRect(-sr, -sr, sr*2, sr*2, cr);
      ctx.fill();
      break;
      
    case 'triangle':
      const tr = r * 1.05;
      ctx.beginPath();
      ctx.moveTo(0, -tr);
      ctx.lineTo(tr * 0.87, tr * 0.5);
      ctx.lineTo(-tr * 0.87, tr * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // Highlight
      ctx.fillStyle = color.light;
      ctx.globalAlpha = alpha * 0.35;
      ctx.beginPath();
      ctx.moveTo(0, -tr);
      ctx.lineTo(tr * 0.3, -tr * 0.1);
      ctx.lineTo(-tr * 0.3, -tr * 0.1);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = alpha;
      break;
      
    case 'star':
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a1 = (Math.PI * 2 * i / 5) - Math.PI / 2;
        const a2 = a1 + Math.PI / 5;
        ctx.lineTo(Math.cos(a1) * r, Math.sin(a1) * r);
        ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // Center highlight
      ctx.fillStyle = color.light;
      ctx.globalAlpha = alpha * 0.4;
      ctx.beginPath();
      ctx.arc(0, -r*0.15, r*0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = alpha;
      break;
      
    case 'hexagon':
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 * i / 6) - Math.PI / 6;
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // Glossy
      const hg = ctx.createRadialGradient(-r*0.25, -r*0.25, 0, 0, 0, r);
      hg.addColorStop(0, 'rgba(255,255,255,0.45)');
      hg.addColorStop(0.6, 'rgba(255,255,255,0)');
      ctx.fillStyle = hg;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 * i / 6) - Math.PI / 6;
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      break;
  }
  
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBoard() {
  // Board background
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  const br = 12;
  ctx.beginPath();
  ctx.roundRect(boardX - 6, boardY - 6, boardW + 12, boardH + 12, br);
  ctx.fill();
  
  // Grid cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = boardX + c * cellSize;
      const y = boardY + r * cellSize;
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)';
      ctx.fillRect(x, y, cellSize, cellSize);
    }
  }
  
  // Gems
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const gem = board[r][c];
      if (!gem) continue;
      
      const px = boardX + gem.x * cellSize;
      const py = boardY + gem.y * cellSize;
      const isSelected = selectedGem && selectedGem.row === r && selectedGem.col === c;
      
      drawGem(px, py, cellSize, gem.type, gem.scale, gem.alpha, isSelected);
    }
  }
  
  // Selection indicator
  if (selectedGem && gamePhase === 'playing') {
    const sx = boardX + selectedGem.col * cellSize;
    const sy = boardY + selectedGem.row * cellSize;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.strokeRect(sx + 2, sy + 2, cellSize - 4, cellSize - 4);
  }
}

function drawBackground() {
  // Animated gradient background
  const time = Date.now() * 0.001;
  const grd = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  const hue1 = 240 + Math.sin(time * 0.3) * 20;
  const hue2 = 280 + Math.cos(time * 0.2) * 20;
  grd.addColorStop(0, `hsl(${hue1}, 70%, 55%)`);
  grd.addColorStop(0.5, `hsl(${hue2}, 60%, 45%)`);
  grd.addColorStop(1, `hsl(${hue1 + 60}, 80%, 70%)`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Floating shapes in background
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 8; i++) {
    const x = (Math.sin(time * 0.3 + i * 1.7) * 0.5 + 0.5) * canvas.width;
    const y = (Math.cos(time * 0.2 + i * 2.3) * 0.5 + 0.5) * canvas.height;
    const s = 30 + Math.sin(time + i) * 15;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Animation system ──
function animateGems(dt) {
  let allDone = true;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const gem = board[r][c];
      if (!gem) continue;
      
      // Interpolate position
      const speed = gem.isNew ? FALL_SPEED : SWAP_SPEED;
      gem.x += (gem.targetX - gem.x) * speed * dt * 60;
      gem.y += (gem.targetY - gem.y) * speed * dt * 60;
      
      if (Math.abs(gem.x - gem.targetX) > 0.01 || Math.abs(gem.y - gem.targetY) > 0.01) {
        allDone = false;
      } else {
        gem.x = gem.targetX;
        gem.y = gem.targetY;
        gem.isNew = false;
      }
    }
  }
  return allDone;
}

// ── Celebration system ──
function showCelebration(matchCount, isCombo) {
  if (celebTimer > 0) return;
  
  // Show celebration for big matches (4+) or combos (2+)
  if (matchCount >= 4 || (isCombo && comboCount >= 2)) {
    const celebEl = document.getElementById('celebration');
    const facesEl = document.getElementById('celeb-faces');
    const msgEl = document.getElementById('celeb-msg');
    
    facesEl.innerHTML = '';
    
    if (matchCount >= 6 || comboCount >= 3) {
      // Show all 3 faces for really big matches
      FAMILY.forEach(f => {
        const img = document.createElement('img');
        img.src = FACE_DATA[f.key];
        img.className = 'celebration-face';
        img.alt = f.name;
        facesEl.appendChild(img);
      });
    } else {
      // Show 1 random family member
      const member = FAMILY[Math.floor(Math.random() * FAMILY.length)];
      const img = document.createElement('img');
      img.src = FACE_DATA[member.key];
      img.className = 'celebration-face';
      img.style.width = '120px';
      img.style.height = '120px';
      img.alt = member.name;
      facesEl.appendChild(img);
    }
    
    msgEl.textContent = CELEB_MESSAGES[Math.floor(Math.random() * CELEB_MESSAGES.length)];
    celebEl.classList.add('active');
    playCelebSound();
    
    celebTimer = 2000;
    setTimeout(() => {
      celebEl.classList.remove('active');
    }, 1800);
  }
}

function showLevelComplete() {
  gamePhase = 'levelComplete';
  const overlay = document.getElementById('level-complete');
  const facesEl = document.getElementById('lc-faces');
  const badge = document.getElementById('lc-badge');
  const title = document.getElementById('lc-title');
  const scoreEl = document.getElementById('lc-score');
  
  facesEl.innerHTML = '';
  FAMILY.forEach(f => {
    const img = document.createElement('img');
    img.src = FACE_DATA[f.key];
    img.className = 'celebration-face';
    img.alt = f.name;
    facesEl.appendChild(img);
  });
  
  badge.textContent = `Level ${level} Complete`;
  title.textContent = LEVEL_MESSAGES[Math.floor(Math.random() * LEVEL_MESSAGES.length)];
  scoreEl.textContent = `Score: ${score}`;
  
  overlay.classList.add('active');
  playCelebSound();
  
  // Spawn confetti particles
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * canvas.width;
    const colors = ['#FF6B8A', '#7C5CFF', '#4ECDC4', '#FFD93D', '#FF8B3D', '#6BCB77'];
    particles.push({
      x: x, y: -10,
      vx: (Math.random() - 0.5) * 100,
      vy: 100 + Math.random() * 200,
      life: 2 + Math.random() * 2,
      maxLife: 4,
      size: 4 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      lightColor: '#fff'
    });
  }
}

// ── Game flow ──
let cascadePhase = 'idle'; // idle, matching, dropping
let cascadeTimer = 0;

function processBoard() {
  if (gamePhase !== 'playing' && gamePhase !== 'animating') return;
  
  const matches = findMatches();
  if (matches.size > 0) {
    gamePhase = 'animating';
    comboCount++;
    
    const count = removeMatches(matches);
    const points = count * 10 * comboCount;
    score += points;
    
    playMatchSound(comboCount);
    showCelebration(count, comboCount > 1);
    updateHUD();
    
    cascadePhase = 'dropping';
    cascadeTimer = 200;
  } else {
    comboCount = 0;
    
    if (gamePhase === 'animating') {
      gamePhase = 'playing';
      
      // Check level complete
      if (score >= targetScore) {
        showLevelComplete();
        return;
      }
      
      // Check game over
      if (movesLeft <= 0) {
        gamePhase = 'gameOver';
        setTimeout(() => {
          // Reset
          level = 1;
          score = 0;
          movesLeft = 30;
          targetScore = 800;
          initBoard();
          updateHUD();
          gamePhase = 'playing';
        }, 2000);
        return;
      }
      
      // Check valid moves
      if (!hasValidMoves()) {
        shuffleBoard();
      }
    }
  }
}

// ── Input handling ──
let touchStartX = -1, touchStartY = -1;
let isDragging = false;

function getGridPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;
  const col = Math.floor((x - boardX) / cellSize);
  const row = Math.floor((y - boardY) / cellSize);
  if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
    return { row, col };
  }
  return null;
}

function trySwap(r1, c1, r2, c2) {
  if (gamePhase !== 'playing') return;
  if (r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) return;
  if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) return;
  
  // Swap
  swapInBoard(r1, c1, r2, c2);
  board[r1][c1].targetX = c1;
  board[r1][c1].targetY = r1;
  board[r2][c2].targetX = c2;
  board[r2][c2].targetY = r2;
  
  const matches = findMatches();
  if (matches.size === 0) {
    // Swap back
    swapInBoard(r1, c1, r2, c2);
    board[r1][c1].targetX = c1;
    board[r1][c1].targetY = r1;
    board[r2][c2].targetX = c2;
    board[r2][c2].targetY = r2;
    playTone(200, 0.15, 'square', 0.08);
  } else {
    movesLeft--;
    comboCount = 0;
    playSwapSound();
    updateHUD();
    gamePhase = 'animating';
    setTimeout(() => processBoard(), 250);
  }
  selectedGem = null;
}

canvas.addEventListener('mousedown', (e) => {
  if (gamePhase !== 'playing') return;
  const pos = getGridPos(e.clientX, e.clientY);
  if (!pos) return;
  
  if (selectedGem) {
    trySwap(selectedGem.row, selectedGem.col, pos.row, pos.col);
  } else {
    selectedGem = pos;
    touchStartX = e.clientX;
    touchStartY = e.clientY;
    isDragging = true;
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging || !selectedGem || gamePhase !== 'playing') return;
  const dx = e.clientX - touchStartX;
  const dy = e.clientY - touchStartY;
  const threshold = cellSize * 0.4;
  
  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      dc = dx > 0 ? 1 : -1;
    } else {
      dr = dy > 0 ? 1 : -1;
    }
    trySwap(selectedGem.row, selectedGem.col, selectedGem.row + dr, selectedGem.col + dc);
    isDragging = false;
  }
});

canvas.addEventListener('mouseup', () => { isDragging = false; });

// Touch events
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gamePhase !== 'playing') return;
  const touch = e.touches[0];
  const pos = getGridPos(touch.clientX, touch.clientY);
  if (!pos) return;
  
  if (selectedGem) {
    const dr = Math.abs(pos.row - selectedGem.row);
    const dc = Math.abs(pos.col - selectedGem.col);
    if (dr + dc === 1) {
      trySwap(selectedGem.row, selectedGem.col, pos.row, pos.col);
    } else {
      selectedGem = pos;
    }
  } else {
    selectedGem = pos;
  }
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
  isDragging = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDragging || !selectedGem || gamePhase !== 'playing') return;
  const touch = e.touches[0];
  const dx = touch.clientX - touchStartX;
  const dy = touch.clientY - touchStartY;
  const threshold = cellSize * 0.35;
  
  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      dc = dx > 0 ? 1 : -1;
    } else {
      dr = dy > 0 ? 1 : -1;
    }
    trySwap(selectedGem.row, selectedGem.col, selectedGem.row + dr, selectedGem.col + dc);
    isDragging = false;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  isDragging = false;
}, { passive: false });

// ── HUD updates ──
function updateHUD() {
  document.getElementById('hud-level').textContent = level;
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-moves').textContent = movesLeft;
  
  const progress = Math.min(100, (score / targetScore) * 100);
  document.getElementById('progress-fill').style.width = progress + '%';
}

// ── Level system ──
function nextLevel() {
  level++;
  movesLeft = Math.max(20, 35 - level * 2);
  targetScore = 600 + level * 300;
  initBoard();
  updateHUD();
  gamePhase = 'playing';
  
  document.getElementById('level-complete').classList.remove('active');
}

// ── Start game ──
document.getElementById('play-btn').addEventListener('click', () => {
  initAudio();
  const titleScreen = document.getElementById('title-screen');
  titleScreen.style.opacity = '0';
  setTimeout(() => {
    titleScreen.style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('progress-bar').style.display = 'block';
    initBoard();
    updateHUD();
    gamePhase = 'playing';
  }, 500);
});

document.getElementById('next-btn').addEventListener('click', () => {
  nextLevel();
});

// ── Game loop ──
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  
  // Update
  if (gamePhase !== 'title') {
    const allSettled = animateGems(dt);
    updateParticles(dt);
    
    if (celebTimer > 0) celebTimer -= dt * 1000;
    
    if (cascadePhase === 'dropping' && cascadeTimer > 0) {
      cascadeTimer -= dt * 1000;
      if (cascadeTimer <= 0) {
        dropGems();
        cascadePhase = 'idle';
        setTimeout(() => processBoard(), 300);
      }
    }
  }
  
  // Draw
  drawBackground();
  if (gamePhase !== 'title') {
    drawBoard();
    drawParticles();
    
    // Game over text
    if (gamePhase === 'gameOver') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = '700 36px Fredoka, sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText('No Moves Left!', canvas.width / 2, canvas.height / 2 - 20);
      ctx.font = '400 18px "Plus Jakarta Sans", sans-serif';
      ctx.fillText('Restarting...', canvas.width / 2, canvas.height / 2 + 20);
      ctx.textAlign = 'left';
    }
  }
  
  requestAnimationFrame(gameLoop);
}

// ── Init ──
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(gameLoop);

// ── Testing hooks ──
window.render_game_to_text = () => JSON.stringify({
  phase: gamePhase,
  score: score,
  level: level,
  movesLeft: movesLeft,
  targetScore: targetScore,
  boardSize: { rows: ROWS, cols: COLS },
  selectedGem: selectedGem,
  comboCount: comboCount
});

window.advanceTime = (ms) => {
  const steps = Math.max(1, Math.round(ms / (1000/60)));
  for (let i = 0; i < steps; i++) {
    const ts = performance.now();
    gameLoop(ts);
  }
};
